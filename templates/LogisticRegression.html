<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistic Regression to Predict Purchase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <h1>Logistic Regression: Predict Purchase</h1>
    <form method="post">
        <label for="age">Age</label>
        <input type="number" name="age" required><br>
        <label for="income">Income</label>
        <input type="number" name="income" required><br>
        <label for="visits">Visits</label>
        <input type="number" name="visits" required><br>
        <label for="time">Time</label>
        <input type="number" name="time" required><br>
        <label for="purchases">Purchases</label>
        <input type="number" name="purchases" required><br>
        <label for="discount">Discount</label>
        <input type="number" name="discount" required><br>
        <button type="submit">Predict</button>
    </form>
    {% if result is not none %}
    <h2>Prediction: {{ result }}</h2>
    {% endif %}
</body>
</html>
