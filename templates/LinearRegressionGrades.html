<body>
    <h1> Linear Regression : Calculate Grade Depends on study</h1>
    <form method="post">
        <label for ="hours"> Study Hours </label>
        <input type ="number" name="hours" required>
        <button type="submit">Predict</button>

    </form>
     {% if result is not none %}
     <h2> Estimated Grade: {{result}}</h2>
     {% endif %}
     {% if plot_url %}
     <img src="{{ url_for('static', filename=plot_url) }}" alt="Regression Plot" class="img-fluid">
     {% endif %}

</div>
