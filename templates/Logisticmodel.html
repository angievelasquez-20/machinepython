<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>business :AI & DS Job Market</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="container mt-5">

<h1 class="text-center mb-4">AI Job Hiring Prediction</h1>

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card">

<form method="post">

<label>Years Experience</label>
<input type="number" step="0.1" name="experience" class="form-control mb-3" required>

<label>Python</label>
<select name="python" class="form-control mb-3">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>SQL</label>
<select name="sql" class="form-control mb-3">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Machine Learning</label>
<select name="ml" class="form-control mb-3">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<button class="btn btn-primary w-100">Predict</button>

</form>

</div>
</div>
</div>

<!-- RESULT -->
{% if result %}
<div class="card mt-4 text-center 
    {% if prob_percent > 70 %}
        result-good
    {% elif prob_percent > 40 %}
        result-mid
    {% else %}
        result-bad
    {% endif %}
">

    <h3>{{ result }} ({{ prob_percent }}%)</h3>

    <div class="progress mt-3">
        <div class="progress-bar 
            {% if prob_percent > 70 %}
                bg-success
            {% elif prob_percent > 40 %}
                bg-warning
            {% else %}
                bg-danger
            {% endif %}
        "style="width: {{ prob_percent }}%">
            {{ prob_percent }}%
        </div>
    </div>

</div>
{% endif %}

<!-- METRICS -->
{% if accuracy %}
<div class="card mt-3 text-center">
    <h5>Model Accuracy</h5>
    <p>{{ accuracy_percent }}%</p>
</div>
{% endif %}

{% if report %}
<div class="card mt-3">
    <h5>Classification Report</h5>
    <pre>{{ report }}</pre>
</div>
{% endif %}

<!-- GRAPHS -->
<div class="row mt-4">
    <div class="col-md-6">
        <h5 class="text-center">Confusion Matrix</h5>
        <img src="{{ url_for('static', filename='confusion_matrix.png') }}" class="img-fluid rounded">
    </div>

    <div class="col-md-6">
        <h5 class="text-center">ROC Curve</h5>
        <img src="{{ url_for('static', filename='roc_curve.png') }}" class="img-fluid rounded">
    </div>
</div>

<div class="text-center mt-4">
    <a href="/" class="btn btn-light">Back Home</a>
</div>

</body>
</html>
