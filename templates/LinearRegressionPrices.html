<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
</head>

<body class="container mt-5">

    <h1 class="text-center">House Price Prediction</h1>

    <p class="text-center text-muted">
        Predict house prices based on size and number of rooms using Linear Regression
    </p>

    <form method="post" class="mt-4">

        <div class="mb-3">
            <label>House Size (m²)</label>
            <input type="number" name="size" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Number of Rooms</label>
            <input type="number" name="rooms" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">
            Predict Price
        </button>

    </form>

    {% if result is not none %}
        <div class="alert alert-success mt-4 text-center">
            Estimated Price: ${{ result }}
        </div>
    {% endif %}

    {% if plot_url %}
        <div class="mt-4 text-center">
            <img src="{{ url_for('static', filename=plot_url) }}" 
                 class="img-fluid rounded shadow" 
                 alt="Regression Plot">
        </div>
    {% endif %}

    <div class="mt-4 d-flex justify-content-between">
        <button onclick="window.location.href='/'" class="btn btn-primary">Back home</button>
        <button onclick="window.location.href='/secondPage'" class="btn btn-primary">Previous page</button>
        <button onclick="window.location.href='/logisticRegression'" class="btn btn-secondary">Next page</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script> 
</body>
</html>
