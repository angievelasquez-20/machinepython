<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinearRegressionCalories</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
</head>

<body class="container mt-5">

    <h1 class="text-center">Calories Prediction</h1>

    <form method="post" class="mt-4">

        <div class="mb-3">
            <label>Duration (minutes)</label>
            <input type="number" name="duration" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Intensity (1 - 10)</label>
            <input type="number" name="intensity" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">
            Predict
        </button>

    </form>

{% if plot_url %}
    <div class="mt-4 text-center">
        <img src="{{ url_for('static', filename=plot_url) }}" 
             class="img-fluid rounded shadow" 
             alt="Regression Plot">
    </div>
{% endif %}


    <button onclick="window.location.href='/'" class="btn btn-primary">Back home</button>
    <button onclick="window.location.href='/secondPage'" class="btn btn-primary">previous page</button>
    <button onclick="window.location.href='/logisticRegression'" class="btn btn-secondary">Next page</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> 
</body>
</html>
