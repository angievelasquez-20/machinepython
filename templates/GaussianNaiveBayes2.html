<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naive Bayes Diabetes Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f2027,#2c5364);
            color:white;
        }

        .card{
            border-radius:15px;
        }

        .result-box{
            font-size:22px;
            font-weight:bold;
            padding:20px;
            border-radius:10px;
        }

        .low{ background:#198754; }
        .mid{ background:#ffc107; color:black;}
        .high{ background:#dc3545; }

        .container-box{
            background:white;
            color:black;
            padding:20px;
            border-radius:15px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">🧠 Naive Bayes Diabetes Prediction</h2>

    <div class="container-box shadow">

        <form method="POST">

            <div class="row">

                <!-- GLUCOSE -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Glucose Level</label>
                    <select name="glucose" class="form-control" required>

                        <option value="">Select value</option>

                        <option value="30">30</option>
                        <option value="35">35</option>
                        <option value="40">40</option>
                        <option value="45">45</option>
                        <option value="50">50</option>
                        <option value="55">55</option>
                        <option value="60">60</option>
                        <option value="65">65</option>

                    </select>
                </div>

                <!-- BLOOD PRESSURE -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Blood Pressure</label>
                    <select name="bloodpressure" class="form-control" required>

                        <option value="">Select value</option>

                        <option value="60">60</option>
                        <option value="63">63</option>
                        <option value="65">65</option>
                        <option value="67">67</option>
                        <option value="68">68</option>
                        <option value="70">70</option>
                        <option value="72">72</option>
                        <option value="73">73</option>
                        <option value="75">75</option>
                        <option value="78">78</option>
                        <option value="80">80</option>
                        <option value="82">82</option>
                        <option value="85">85</option>
                        <option value="87">87</option>
                        <option value="88">88</option>
                        <option value="90">90</option>
                        <option value="93">93</option>
                        <option value="97">97</option>
                        <option value="98">98</option>

                    </select>
                </div>

            </div>

            <button class="btn btn-dark w-100 mt-3">Predict</button>
        </form>
    </div>

    <!-- RESULTADO -->
    {% if result %}
    <div class="mt-4 text-center">

        <div class="result-box
            {% if prob_percent < 40 %} low
            {% elif prob_percent < 70 %} mid
            {% else %} high
            {% endif %}
        ">
            {{ result }} ({{ prob_percent }}%)
        </div>

        <div class="progress mt-3">
            <div class="progress-bar
                {% if prob_percent < 40 %} bg-success
                {% elif prob_percent < 70 %} bg-warning
                {% else %} bg-danger
                {% endif %}
            "
            style="width: {{ prob_percent }}%">
                {{ prob_percent }}%
            </div>
        </div>

    </div>
    {% endif %}

    <!-- MÉTRICAS -->
    {% if accuracy %}
    <div class="container-box mt-4 text-center">
        <h5>Model Accuracy</h5>
        <p>{{ accuracy_percent }}%</p>
    </div>

    <div class="container-box mt-3">
        <pre>{{ report }}</pre>
    </div>

    <div class="row mt-3">

        <div class="col-md-6">
            <div class="container-box text-center">
                <h6>Confusion Matrix</h6>
                <img src="{{ url_for('static', filename='confusion_matrix.png') }}" class="img-fluid">
            </div>
        </div>

        <div class="col-md-6">
            <div class="container-box text-center">
                <h6>ROC Curve</h6>
                <img src="{{ url_for('static', filename='roc_curve.png') }}" class="img-fluid">
            </div>
        </div>

    </div>
    {% endif %}

</div>

</body>
</html>
